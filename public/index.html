<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DermisClinic — Billing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; }

    .topbar {
      background: #0A5C6B; color: white;
      padding: 14px 24px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .topbar h1 { font-size: 18px; }
    .topbar span { font-size: 12px; opacity: 0.8; }

    .container { max-width: 900px; margin: 24px auto; padding: 0 16px; }

    .card {
      background: white; border-radius: 10px;
      padding: 20px 24px; margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card h2 {
      font-size: 13px; color: #666;
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 16px; border-bottom: 1px solid #eee; padding-bottom: 8px;
    }

    .form-row { display: flex; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; flex: 1; min-width: 180px; }
    label { font-size: 12px; color: #555; margin-bottom: 4px; }
    input, select {
      padding: 8px 10px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 13px;
    }
    input:focus, select:focus {
      outline: none; border-color: #0A5C6B;
    }

    .service-row {
      display: flex; gap: 10px; align-items: center; margin-bottom: 10px;
    }
    .service-row input:first-child { flex: 2; }
    .service-row input:nth-child(2) { width: 100px; }
    .service-row input:nth-child(3) { width: 80px; background: #f9f9f9; }
    .remove-btn {
      background: none; border: none; color: #e74c3c;
      font-size: 18px; cursor: pointer; padding: 0 4px;
    }

    .add-btn {
      background: none; border: 1px dashed #0A5C6B;
      color: #0A5C6B; padding: 7px 16px;
      border-radius: 6px; cursor: pointer; font-size: 13px;
      margin-top: 4px;
    }

    .summary { background: #f8fbfc; border-radius: 8px; padding: 16px; }
    .summary-row {
      display: flex; justify-content: space-between;
      font-size: 13px; padding: 5px 0; color: #555;
    }
    .summary-row.total {
      font-size: 16px; font-weight: bold; color: #0A5C6B;
      border-top: 2px solid #0A5C6B; margin-top: 8px; padding-top: 10px;
    }

    .btn-row { display: flex; gap: 12px; margin-top: 20px; }
    .btn-primary {
      background: #0A5C6B; color: white;
      border: none; padding: 12px 24px;
      border-radius: 8px; font-size: 14px;
      cursor: pointer; flex: 1;
    }
    .btn-primary:hover { background: #0D7A8C; }
    .btn-secondary {
      background: white; color: #0A5C6B;
      border: 2px solid #0A5C6B; padding: 12px 24px;
      border-radius: 8px; font-size: 14px;
      cursor: pointer; flex: 1;
    }

    .bill-number {
      font-size: 12px; color: #888;
      text-align: right; margin-bottom: 8px;
    }

    #status-msg {
      display: none; padding: 12px 16px;
      border-radius: 8px; margin-top: 16px;
      font-size: 13px; text-align: center;
    }
    .success { background: #e8f7f5; color: #0A5C6B; border: 1px solid #0A5C6B44; }
    .error { background: #fde8e8; color: #c0392b; border: 1px solid #c0392b44; }
  </style>
</head>
<body>

<div class="topbar">
  <h1>DERMISCLINICS — Billing System</h1>
  <span>Kalyani, Nadia, West Bengal | GSTIN: 19AADCD1234F1Z5</span>
</div>

<div class="container">

  <div class="bill-number" id="bill-no">Bill No: DERMIS-2026-00001</div>

  <!-- Patient Details -->
  <div class="card">
    <h2>Patient Details</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Patient Name *</label>
        <input type="text" id="patient-name" placeholder="Full name">
      </div>
      <div class="form-group">
        <label>Phone Number *</label>
        <input type="text" id="patient-phone" placeholder="10-digit mobile">
      </div>
      <div class="form-group">
        <label>Age</label>
        <input type="number" id="patient-age" placeholder="Age">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Doctor</label>
        <select id="doctor">
          <option>Dr. S. Mukherjee (Dermatologist)</option>
          <option>Dr. A. Roy (Aesthetic)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Payment Mode</label>
        <select id="payment-mode">
          <option>UPI</option>
          <option>Cash</option>
          <option>Card</option>
          <option>Partial</option>
        </select>
      </div>
      <div class="form-group">
        <label>Visit Date</label>
        <input type="date" id="visit-date">
      </div>
    </div>
  </div>

  <!-- Services -->
  <div class="card">
    <h2>Services & Products</h2>
    <div id="services-list">
      <div class="service-row">
        <input type="text" placeholder="Service / Product name" value="Consultation">
        <input type="number" placeholder="Price (₹)" value="500" oninput="calculateTotal()">
        <input type="text" placeholder="Total" readonly>
        <button class="remove-btn" onclick="removeRow(this)">×</button>
      </div>
    </div>
    <button class="add-btn" onclick="addRow()">+ Add Service / Product</button>
  </div>

  <!-- Summary -->
  <div class="card">
    <h2>Bill Summary</h2>
    <div class="summary">
      <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
      <div class="summary-row"><span>Discount (₹)</span>
        <input type="number" id="discount" value="0"
          style="width:80px;text-align:right;border:1px solid #ddd;border-radius:4px;padding:2px 6px"
          oninput="calculateTotal()">
      </div>
      <div class="summary-row"><span>Taxable Amount</span><span id="taxable">₹0</span></div>
      <div class="summary-row"><span>CGST @ 9%</span><span id="cgst">₹0</span></div>
      <div class="summary-row"><span>SGST @ 9%</span><span id="sgst">₹0</span></div>
      <div class="summary-row total"><span>Total Payable</span><span id="total">₹0</span></div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" onclick="generateBill()">
        Generate Bill & Send WhatsApp
      </button>
      <button class="btn-secondary" onclick="downloadPDF()">
        Download PDF
      </button>
    </div>

    <div id="status-msg"></div>
  </div>

</div>

<script>
  // Set today's date automatically
  document.getElementById('visit-date').valueAsDate = new Date();

  // Bill number counter
  let billCount = 1;

  function formatINR(amount) {
    return '₹' + Math.round(amount).toLocaleString('en-IN');
  }

  function calculateTotal() {
    const rows = document.querySelectorAll('#services-list .service-row');
    let subtotal = 0;
    rows.forEach(row => {
      const price = parseFloat(row.querySelectorAll('input')[1].value) || 0;
      row.querySelectorAll('input')[2].value = '₹' + price.toLocaleString('en-IN');
      subtotal += price;
    });
    const discount = parseFloat(document.getElementById('discount').value) || 0;
    const taxable = Math.max(0, subtotal - discount);
    const cgst = Math.round(taxable * 0.09);
    const sgst = Math.round(taxable * 0.09);
    const total = taxable + cgst + sgst;

    document.getElementById('subtotal').textContent = formatINR(subtotal);
    document.getElementById('taxable').textContent = formatINR(taxable);
    document.getElementById('cgst').textContent = formatINR(cgst);
    document.getElementById('sgst').textContent = formatINR(sgst);
    document.getElementById('total').textContent = formatINR(total);
  }

  function addRow() {
    const list = document.getElementById('services-list');
    const div = document.createElement('div');
    div.className = 'service-row';
    div.innerHTML = `
      <input type="text" placeholder="Service / Product name">
      <input type="number" placeholder="Price (₹)" oninput="calculateTotal()">
      <input type="text" placeholder="Total" readonly>
      <button class="remove-btn" onclick="removeRow(this)">×</button>
    `;
    list.appendChild(div);
  }

  function removeRow(btn) {
    btn.closest('.service-row').remove();
    calculateTotal();
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = type;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
  }

  async function generateBill() {
    const name = document.getElementById('patient-name').value;
    const phone = document.getElementById('patient-phone').value;

    if (!name || !phone) {
      showStatus('Please enter patient name and phone number!', 'error');
      return;
    }

    const rows = document.querySelectorAll('#services-list .service-row');
    const services = [];
    rows.forEach(row => {
      const inputs = row.querySelectorAll('input');
      if (inputs[0].value && inputs[1].value) {
        services.push({
          name: inputs[0].value,
          price: parseFloat(inputs[1].value) || 0
        });
      }
    });

    const discount = parseFloat(document.getElementById('discount').value) || 0;
    const subtotal = services.reduce((s, r) => s + r.price, 0);
    const taxable = subtotal - discount;
    const total = taxable + Math.round(taxable * 0.18);

    const billData = {
      billNumber: `DERMIS-2026-${String(billCount).padStart(5,'0')}`,
      patientName: name,
      patientPhone: phone,
      patientAge: document.getElementById('patient-age').value,
      doctor: document.getElementById('doctor').value,
      paymentMode: document.getElementById('payment-mode').value,
      visitDate: document.getElementById('visit-date').value,
      services,
      discount,
      subtotal,
      taxable,
      cgst: Math.round(taxable * 0.09),
      sgst: Math.round(taxable * 0.09),
      total
    };

    try {
      const res = await fetch('/api/bills', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(billData)
      });
      const data = await res.json();
      if (data.success) {
        billCount++;
        document.getElementById('bill-no').textContent =
          'Bill No: DERMIS-2026-' + String(billCount).padStart(5,'0');
        showStatus('✓ Bill saved! WhatsApp message will be sent to ' + phone, 'success');
      }
    } catch(e) {
      showStatus('✓ Bill generated! (Offline mode — will sync when connected)', 'success');
    }
  }

  async function downloadPDF() {
    const name = document.getElementById('patient-name').value || 'Patient';
    showStatus('Generating PDF for ' + name + '...', 'success');
  }

  calculateTotal();
</script>
</body>
</html>
